# lmaa.space status page — powered by Upptime, rendered by Velvet.
# Velvet front-end: https://github.com/phranck/velvet
#
# All hosts are dual-stack (A + AAAA). Each service has an IPv4 check (run
# from the GitHub runner) plus an IPv6 check via Globalping (explicit slug
# "<base>-ipv6"); Velvet folds the pair into one card. Globalping uses the
# GLOBALPING_TOKEN repo secret. Every service is probed through a uniform
# lmaa.space/health/<service> endpoint: the backend (which shares the
# dual-stack Zerops network) reaches each app and answers with a consistent
# JSON status.

owner: phranck
repo: status.lmaa.space

sites:
  - name: Backend
    url: https://api.lmaa.space/health/backend
  - name: Backend IPv6
    slug: backend-ipv6
    url: https://api.lmaa.space/health/backend
    type: globalping
    check: http
    ipv6: true
  - name: Dashboard
    url: https://api.lmaa.space/health/dashboard
  - name: Dashboard IPv6
    slug: dashboard-ipv6
    url: https://api.lmaa.space/health/dashboard
    type: globalping
    check: http
    ipv6: true
  - name: Website
    url: https://api.lmaa.space/health/website
  - name: Website IPv6
    slug: website-ipv6
    url: https://api.lmaa.space/health/website
    type: globalping
    check: http
    ipv6: true
  - name: Database
    url: https://api.lmaa.space/health/db
  - name: Database IPv6
    slug: database-ipv6
    url: https://api.lmaa.space/health/db
    type: globalping
    check: http
    ipv6: true

status-website:
  cname: status.lmaa.space
  name: lmaa.space
  logoUrl: https://lmaa.space/logo-amber.png
  navbar: []
  velvet:
    layout: cards
    logoHeight: 64
    defaultRange: 90d
    accent: "#b45309"
    accentDeg: "#d29922"
    accentDown: "#f85149"
    # umami:
    #   websiteId: "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
    #   src: "https://umami.layered.work/script.js"
    icons:
      backend: ph-gear-six
      dashboard: ph-gauge
      website: ph-globe
      database: ph-database
